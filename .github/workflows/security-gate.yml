name: Security Gate

on:
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run CI guard
        run: python3 scripts/ci-guard.py
      - name: Run doctor (non-invasive)
        if: ${{ hashFiles('scripts/doctor.sh') != '' }}
        run: bash scripts/doctor.sh
      - name: Run shell syntax tests
        if: ${{ hashFiles('scripts/test-shell-syntax.sh') != '' }}
        run: bash scripts/test-shell-syntax.sh
      - name: Run runtime parity tests
        if: ${{ hashFiles('scripts/test-runtime-parity.sh') != '' }}
        run: bash scripts/test-runtime-parity.sh
      - name: Run workflow contract tests
        if: ${{ hashFiles('scripts/test-workflow-contract.sh') != '' }}
        run: bash scripts/test-workflow-contract.sh
